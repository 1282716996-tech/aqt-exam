<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AQT 在线测试系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;font-size:15px;min-height:100vh}
.container{max-width:750px;margin:0 auto;padding:16px}
.btn{display:block;width:100%;height:46px;line-height:46px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;text-align:center}
.btn:active{opacity:.85}
.btn-primary{background:#3b82f6;color:#fff}
.btn-outline{background:#fff;color:#3b82f6;border:2px solid #3b82f6}
.btn-danger{background:#fff;color:#ef4444;border:2px solid #ef4444}
.btn-seed{background:#f0fdf4;color:#16a34a;border:2px solid #86efac}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.login-card{text-align:center;padding:50px 24px}
.login-icon{font-size:64px;margin-bottom:8px}
.login-title{font-size:24px;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.login-desc{font-size:14px;color:#888;margin-bottom:28px}
.form-group{text-align:left;margin-bottom:18px}
.form-label{font-size:14px;font-weight:600;color:#333;margin-bottom:6px;display:block}
.form-input{width:100%;height:46px;background:#f5f5f5;border:1.5px solid #e5e7eb;border-radius:10px;padding:0 14px;font-size:15px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:#3b82f6}
.user-bar{display:flex;align-items:center;background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.user-icon{font-size:28px;margin-right:10px}
.user-info{flex:1}
.user-name{font-weight:700;font-size:16px}
.user-switch{color:#3b82f6;font-size:13px;cursor:pointer;padding:4px 8px}
.back-btn{display:inline-flex;align-items:center;color:#3b82f6;font-size:14px;cursor:pointer;padding:6px 0;margin-bottom:10px;font-weight:600}
.hero{text-align:center;padding:16px 0}
.hero-icon{font-size:56px}
.hero-title{font-size:22px;font-weight:800;color:#1a1a2e;margin:6px 0 2px;cursor:default;user-select:none}
.hero-desc{font-size:14px;color:#888}
.info-cards{display:flex;gap:10px;margin:18px 0}
.info-card{flex:1;text-align:center;background:#fff;border-radius:10px;padding:16px 6px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.info-num{font-size:24px;font-weight:800;color:#3b82f6}
.info-label{font-size:12px;color:#999;margin-top:4px}
.rules-title{font-size:16px;font-weight:700;margin-bottom:10px}
.rules-item{font-size:13px;color:#666;line-height:2.2}
.progress-bar{height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:#3b82f6;border-radius:3px;transition:width .3s}
.progress-text{font-size:12px;color:#999;text-align:right;margin-bottom:14px}
.q-header{display:flex;align-items:center;margin-bottom:10px}
.q-index{font-size:16px;font-weight:800;color:#1a1a2e;margin-right:8px}
.q-tag{font-size:11px;padding:3px 10px;border-radius:12px;color:#fff;font-weight:600}

.tag-truefalse{background:#10b981}
.q-title{font-size:15px;line-height:1.7;margin-bottom:14px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;cursor:pointer;transition:all .15s;font-size:14px;gap:10px}
.option:active{background:#f9fafb}
.option.checked{border-color:#3b82f6;background:#eff6ff}
.option input{transform:scale(1.3);accent-color:#3b82f6;flex-shrink:0}
.submit-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 24px;background:#fff;box-shadow:0 -2px 12px rgba(0,0,0,.06);max-width:750px;margin:0 auto}
.submit-hint{text-align:center;font-size:13px;color:#f59e0b;margin-bottom:10px;font-weight:500}
#examList{padding-bottom:90px}
.score-section{text-align:center;padding:28px 0}
.score-ring{width:130px;height:130px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;border:6px solid #10b981}
.score-ring.fail{border-color:#ef4444}
.score-num{font-size:44px;font-weight:900}
.score-label{font-size:14px;color:#999;margin-top:4px}
.score-status{font-size:22px;font-weight:700;margin-bottom:6px}
.score-status.pass{color:#10b981}
.score-status.fail{color:#ef4444}
.score-summary{font-size:14px;color:#888}
.split{margin:0 10px;color:#ddd}
.detail-title{font-size:17px;font-weight:700;margin:20px 0 12px}
.d-header{display:flex;align-items:center;margin-bottom:8px}
.d-index{font-size:14px;font-weight:700;margin-right:8px}
.d-tag{font-size:11px;padding:3px 10px;border-radius:12px;color:#fff;font-weight:600}
.tag-right{background:#10b981}
.tag-wrong{background:#ef4444}
.d-title{font-size:14px;line-height:1.6;margin-bottom:10px;font-weight:500}
.d-options{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.d-opt{font-size:12px;padding:5px 10px;background:#f3f4f6;border-radius:8px;color:#666}
.d-opt.right{background:#d1fae5;color:#065f46;font-weight:700}
.d-opt.wrong{background:#fee2e2;color:#991b1b;text-decoration:line-through}
.d-answer{font-size:13px;margin-bottom:4px}
.d-label{color:#888}
.text-right{color:#10b981;font-weight:700}
.text-wrong{color:#ef4444;font-weight:700}
.action-bar{margin-top:24px;padding-bottom:40px;display:flex;gap:10px;flex-direction:column}
.admin-header{text-align:center;padding:20px 0}
.admin-icon{font-size:48px}
.admin-title{font-size:20px;font-weight:800;color:#1a1a2e;margin:6px 0 2px}
.admin-sub{font-size:13px;color:#999}
.stat-cards{display:flex;gap:10px;margin-bottom:18px}
.stat-card{flex:1;background:#fff;border-radius:12px;padding:16px 0;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.stat-num{font-size:28px;font-weight:900;color:#3b82f6}
.stat-num.green{color:#10b981}
.stat-num.red{color:#ef4444}
.stat-label{font-size:12px;color:#999;margin-top:4px}
.empty{text-align:center;padding:60px 0;color:#bbb;font-size:15px}
.record-card{margin-bottom:10px}
.r-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.r-user{display:flex;align-items:center;gap:10px}
.r-realname{font-size:16px;font-weight:700}
.r-score{font-size:24px;font-weight:900}
.r-score.pass{color:#10b981}
.r-score.fail{color:#ef4444}
.r-bottom{display:flex;justify-content:space-between;font-size:12px;color:#aaa}
.r-del{color:#ef4444;font-size:12px;cursor:pointer;padding:2px 6px}
.r-del:hover{text-decoration:underline}
.loading{text-align:center;padding:50px 0;color:#999;font-size:15px}
.modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999}
.modal-dialog{width:320px;background:#fff;border-radius:16px;padding:32px 24px;text-align:center}
.modal-title{font-size:20px;font-weight:700;margin-bottom:8px}
.modal-desc{font-size:14px;color:#888;margin-bottom:20px}
.modal-input{width:100%;height:46px;background:#f5f5f5;border:1.5px solid #e5e7eb;border-radius:10px;padding:0 14px;font-size:15px;text-align:center;outline:none}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns button{flex:1;height:42px;border-radius:10px;font-size:15px;cursor:pointer;border:none;font-weight:600}
.modal-cancel{background:#f3f4f6;color:#666}
.modal-confirm{background:#3b82f6;color:#fff}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ==================== 配置 ====================
var EXAM_COUNT = 20;
var PASS_SCORE = 60;
var ADMIN_PWD = 'aqttest2026';
var BM_APP_ID = '2940941127b6125eaedc9841eb01d02b';
var BM_API_KEY = 'af1e9c184eab1d52a2569982e2ac3fe5';
var BM_BASE = 'https://api2.bmob.cn';

// ==================== 状态 ====================
var S = { page: 'login', user: null, questions: [], fullQuestions: [], answers: {}, result: null, tapCount: 0, tapTimer: null };

// ==================== 备用题库 ====================
var fallbackBank = [
  {id:1,type:'single',title:'HTML 的全称是什么？',options:['A. Hyper Text Markup Language','B. High Tech Modern Language','C. Hyper Transfer Markup Language','D. Home Tool Markup Language'],answer:'A'},
  {id:2,type:'single',title:'CSS 中哪个属性用于设置背景颜色？',options:['A. color','B. bgcolor','C. background-color','D. background'],answer:'C'},
  {id:3,type:'multiple',title:'以下哪些是 JavaScript 的数据类型？（多选）',options:['A. String','B. Number','C. Boolean','D. Float'],answer:['A','B','C']},
  {id:4,type:'truefalse',title:'微信小程序使用 WXML 作为页面结构语言。',options:['A. 正确','B. 错误'],answer:'A'},
  {id:5,type:'single',title:'小程序中用于页面跳转的 API 是？',options:['A. wx.switchTab','B. wx.navigateTo','C. wx.redirectTo','D. 以上都是'],answer:'D'},
  {id:6,type:'single',title:'CSS 盒子模型中，margin 表示什么？',options:['A. 内边距','B. 外边距','C. 边框','D. 内容区'],answer:'B'},
  {id:7,type:'truefalse',title:'JavaScript 中 == 和 === 是完全等价的。',options:['A. 正确','B. 错误'],answer:'B'},
  {id:8,type:'multiple',title:'以下哪些是微信小程序的合法生命周期函数？（多选）',options:['A. onLoad','B. onShow','C. onReady','D. onCreate'],answer:['A','B','C']},
  {id:9,type:'single',title:'HTTP 状态码 404 表示什么？',options:['A. 服务器错误','B. 未授权','C. 资源未找到','D. 请求超时'],answer:'C'},
  {id:10,type:'single',title:'以下哪个不是 JavaScript 框架？',options:['A. React','B. Vue','C. Django','D. Angular'],answer:'C'},
  {id:11,type:'truefalse',title:'在微信小程序中, app.json 文件是必须存在的。',options:['A. 正确','B. 错误'],answer:'A'},
  {id:12,type:'single',title:'flex 布局中, 设置主轴方向的属性是？',options:['A. flex-wrap','B. flex-direction','C. justify-content','D. align-items'],answer:'B'},
  {id:13,type:'multiple',title:'以下哪些是合法的 CSS 长度单位？（多选）',options:['A. px','B. rpx','C. em','D. vm'],answer:['A','B','C']},
  {id:14,type:'single',title:'JavaScript 中, 用哪个关键字声明常量？',options:['A. var','B. let','C. const','D. static'],answer:'C'},
  {id:15,type:'truefalse',title:'微信小程序的页面文件可以没有 .json 配置文件。',options:['A. 正确','B. 错误'],answer:'A'},
  {id:16,type:'single',title:'Promise 对象代表什么？',options:['A. 同步操作','B. 异步操作的最终完成或失败','C. 一个回调函数','D. 一个定时器'],answer:'B'},
  {id:17,type:'multiple',title:'以下关于 ES6 箭头函数的说法, 正确的有？（多选）',options:['A. 语法更简洁','B. 不绑定自己的 this','C. 不能用作构造函数','D. 没有 arguments 对象'],answer:['A','B','C','D']},
  {id:18,type:'single',title:'Git 中, 将暂存区的内容提交到仓库的命令是？',options:['A. git add','B. git push','C. git commit','D. git merge'],answer:'C'},
  {id:19,type:'truefalse',title:'微信小程序支持直接操作 DOM。',options:['A. 正确','B. 错误'],answer:'B'},
  {id:20,type:'single',title:'在 Vue.js 中, 用于双向数据绑定的指令是？',options:['A. v-bind','B. v-model','C. v-on','D. v-if'],answer:'B'},
  {id:21,type:'single',title:'TCP/IP 协议中, HTTP 默认使用的端口号是？',options:['A. 21','B. 80','C. 443','D. 8080'],answer:'B'},
  {id:22,type:'multiple',title:'以下哪些属于前端性能优化手段？（多选）',options:['A. 图片懒加载','B. 代码压缩','C. CDN 加速','D. 减少 HTTP 请求'],answer:['A','B','C','D']},
  {id:23,type:'truefalse',title:'JSON 是一种 JavaScript 框架。',options:['A. 正确','B. 错误'],answer:'B'},
  {id:24,type:'single',title:'在 CSS 中, 使元素浮动的属性是？',options:['A. display','B. position','C. float','D. clear'],answer:'C'},
  {id:25,type:'truefalse',title:'微信小程序的 rpx 单位可以根据屏幕宽度自适应。',options:['A. 正确','B. 错误'],answer:'A'}
];

// ==================== Bmob API ====================
function bmHeaders() {
  return {
    'X-Bmob-Application-Id': BM_APP_ID,
    'X-Bmob-REST-API-Key': BM_API_KEY,
    'Content-Type': 'application/json'
  };
}

function bmGetQuestions() {
  return fetch(BM_BASE + '/1/classes/questions?limit=999&order=-createdAt', { headers: bmHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(r) { return r.results || []; });
}

function bmSaveRecord(record) {
  return fetch(BM_BASE + '/1/classes/exam_records', {
    method: 'POST', headers: bmHeaders(),
    body: JSON.stringify(record)
  }).then(function(r) { return r.json(); });
}

function bmGetRecords() {
  return fetch(BM_BASE + '/1/classes/exam_records?limit=999&order=-createdAt', { headers: bmHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(r) { return r.results || []; });
}

function bmCheckDup(name) {
  return fetch(BM_BASE + '/1/classes/exam_records?where=' + encodeURIComponent(JSON.stringify({ realname: name })) + '&count=1&limit=0', { headers: bmHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(r) { return r.count > 0; });
}

function bmDeleteRecord(id) {
  return fetch(BM_BASE + '/1/classes/exam_records/' + id, {
    method: 'DELETE', headers: bmHeaders()
  }).then(function(r) { return r.json(); });
}

function bmClearRecords() {
  return bmGetRecords().then(function(all) {
    return Promise.all(all.map(function(r) { return bmDeleteRecord(r.objectId); }));
  });
}

function bmSeedQuestions() {
  return fetch(BM_BASE + '/1/classes/questions?count=1&limit=0', { headers: bmHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (r.count > 0) throw new Error('题库已有 ' + r.count + ' 条数据');
      return Promise.all(fallbackBank.map(function(q) {
        return fetch(BM_BASE + '/1/classes/questions', {
          method: 'POST', headers: bmHeaders(),
          body: JSON.stringify({
            qid: q.id, type: q.type, title: q.title,
            options: q.options, answer: q.answer
          })
        }).then(function(r2) { return r2.json(); });
      }));
    });
}

// ==================== 工具函数 ====================
function shuffle(a) { var r = a.slice(); for (var i = r.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)), t = r[i]; r[i] = r[j]; r[j] = t; } return r; }

function calcScore(qs, uas) {
  var c = 0, w = 0, d = [];
  for (var i = 0; i < qs.length; i++) {
    var q = qs[i], ua = uas[i];
    if (!ua) { w++; d.push({ id: q.id || q.qid, title: q.title, options: q.options, userAnswer: '', rightAnswer: q.answer, correct: false, type: q.type }); continue; }
    var ok;
    if (Array.isArray(q.answer)) {
      var ua2 = (Array.isArray(ua.answer) ? ua.answer : [ua.answer]).slice().sort();
      var sr = q.answer.slice().sort();
      ok = ua2.length === sr.length && ua2.every(function(v, i) { return v === sr[i]; });
    } else {
      ok = String(ua.answer || ua).toUpperCase() === q.answer.toUpperCase();
    }
    ok ? c++ : w++;
    d.push({ id: q.id || q.qid, title: q.title, options: q.options, userAnswer: ua.answer || ua, rightAnswer: q.answer, correct: ok, type: q.type });
  }
  var sc = Math.round(c / qs.length * 100);
  return { score: sc, correct: c, wrong: w, total: qs.length, details: d, isPass: sc >= PASS_SCORE };
}

function fmtTime() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function pad(n) { return n < 10 ? '0' + n : n; }
function esc(s) { s = String(s || ''); return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ==================== 渲染引擎 ====================
function render() {
  var app = document.getElementById('app');
  S.fullQuestions = S.fullQuestions.length > 0 ? S.fullQuestions : [];

  switch (S.page) {
    case 'login': renderLogin(app); break;
    case 'home': renderHome(app); break;
    case 'exam': renderExam(app); break;
    case 'result': renderResult(app); break;
    case 'admin': renderAdmin(app); break;
  }
}

// ==================== 登录页 ====================
function renderLogin(app) {
  app.innerHTML =
    '<div class="container"><div class="login-card card">' +
    '<div class="login-icon">🏆</div>' +
    '<div class="login-title">AQT 在线测试系统</div>' +
    '<div class="login-desc">请输入真实姓名开始考试<br><small>每人仅限答题一次</small></div>' +
    '<div class="form-group"><label class="form-label">真实姓名</label>' +
    '<input class="form-input" id="nameInput" placeholder="请输入您的真实姓名" maxlength="10" autocomplete="off"></div>' +
    '<button class="btn btn-primary" id="loginBtn">开始考试</button></div></div>';

  var inp = document.getElementById('nameInput');
  inp.focus();
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

  function doLogin() {
    var name = inp.value.trim();
    if (!name) { alert('请输入姓名'); return; }
    btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = '验证中...';
    bmCheckDup(name).then(function(exists) {
      if (exists) { alert('您已参加过考试，不能重复答题'); btn.disabled = false; btn.textContent = '开始考试'; return; }
      S.user = { realname: name };
      // 尝试从 Bmob 加载题库
      return bmGetQuestions();
    }).then(function(qs) {
      if (qs && qs.length > 0) S.fullQuestions = qs;
      S.page = 'home'; render();
    }).catch(function(e) {
      if (e && e.message === '已答过') return;
      S.user = { realname: name };
      S.page = 'home'; render();
    });
  }
}

// ==================== 首页 ====================
function renderHome(app) {
  var qcnt = S.fullQuestions.length || fallbackBank.length;
  var source = S.fullQuestions.length > 0 ? 'Bmob云' : '本地';
  app.innerHTML =
    '<div class="container">' +
    '<div class="user-bar"><div class="user-icon">👤</div><div class="user-info"><div class="user-name">' + esc(S.user.realname) + '</div></div><div class="user-switch" id="logoutBtn">切换</div></div>' +
    '<div class="hero"><div class="hero-icon">📝</div><div class="hero-title" id="heroTitle">AQT 在线测试系统</div><div class="hero-desc">专业知识能力测试</div></div>' +
    '<div class="info-cards">' +
    '<div class="info-card"><div class="info-num">' + EXAM_COUNT + '</div><div class="info-label">题目数量</div></div>' +
    '<div class="info-card"><div class="info-num">' + PASS_SCORE + '分</div><div class="info-label">及格分数</div></div>' +
    '<div class="info-card"><div class="info-num">' + qcnt + '</div><div class="info-label">题库总量(' + source + ')</div></div></div>' +
    '<div class="card"><div class="rules-title">📋 考试规则</div><div class="rules-item">• 随机抽取 ' + EXAM_COUNT + ' 道题<br>• 包含单选、多选、判断<br>• 满分 ' + EXAM_COUNT + ' 分，' + PASS_SCORE + ' 分及以上通过<br>• 每人限考一次，成绩上传云端</div></div>' +
    '<button class="btn btn-primary" id="startBtn" style="margin-top:10px">开始考试</button></div>';

  var tapCount = 0, tapTimer = null;
  document.getElementById('heroTitle').addEventListener('click', function() {
    tapCount++; clearTimeout(tapTimer);
    if (tapCount >= 3) { showAdminModal(); tapCount = 0; return; }
    tapTimer = setTimeout(function() { tapCount = 0; }, 1000);
  });
  document.getElementById('logoutBtn').addEventListener('click', function() { S.user = null; S.page = 'login'; render(); });
  document.getElementById('startBtn').addEventListener('click', function() {
    var pool = S.fullQuestions.length > 0 ? S.fullQuestions : fallbackBank;
    S.questions = shuffle(pool).slice(0, EXAM_COUNT);
    S.answers = {}; S.result = null;
    S.page = 'exam'; render();
  });
}

function showAdminModal() {
  var mask = document.createElement('div'); mask.className = 'modal-mask';
  mask.innerHTML =
    '<div class="modal-dialog"><div class="modal-title">🔐 教师后台</div><div class="modal-desc">请输入管理密码</div>' +
    '<input class="modal-input" id="pwdInput" type="password" placeholder="请输入密码" autocomplete="off">' +
    '<div class="modal-btns"><button class="modal-cancel" id="mc">取消</button><button class="modal-confirm" id="mok">确认</button></div></div>';
  document.body.appendChild(mask);
  document.getElementById('pwdInput').focus();
  document.getElementById('mc').addEventListener('click', function() { mask.remove(); });
  document.getElementById('mok').addEventListener('click', function() {
    if (document.getElementById('pwdInput').value === ADMIN_PWD) { mask.remove(); S.page = 'admin'; render(); }
    else alert('密码错误');
  });
  document.getElementById('pwdInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('mok').click(); });
}

// ==================== 考试页 ====================
function renderExam(app) {
  var qs = S.questions;
  var answered = Object.keys(S.answers).length;
  var html = '<div class="container"><a class="back-btn" id="examBack">← 返回首页</a>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + (answered / qs.length * 100) + '%"></div></div>';
  html += '<div class="progress-text">已答 ' + answered + '/' + qs.length + '</div><div id="examList">';

  for (var i = 0; i < qs.length; i++) {
    var q = qs[i], qid = q.id || q.qid, ua = S.answers[qid];
    html += '<div class="card"><div class="q-header"><span class="q-index">' + (i + 1) + '.</span>';
    if (q.type === 'single') html += '<span class="q-tag tag-single">单选</span>';
    else if (q.type === 'multiple') html += '<span class="q-tag tag-multiple">多选</span>';
    else html += '<span class="q-tag tag-truefalse">判断</span>';
    html += '</div><div class="q-title">' + esc(q.title) + '</div><div class="options">';

    for (var j = 0; j < q.options.length; j++) {
      var o = q.options[j], ov = o.charAt(0), checked = '';
      if (q.type === 'single' || q.type === 'truefalse') { if (ua === ov) checked = 'checked'; }
      else { if (ua && ua.indexOf(ov) >= 0) checked = 'checked'; }
      html += '<label class="option' + (checked ? ' checked' : '') + '"><input type="' + (q.type === 'multiple' ? 'checkbox' : 'radio') + '" name="q' + qid + '" value="' + ov + '" ' + checked + ' onchange="saveQ(' + qid + ',\'' + q.type + '\',this)">' + esc(o) + '</label>';
    }
    html += '</div></div>';
  }
  html += '</div></div>';
  html += '<div class="submit-bar"><div id="hint" class="submit-hint" style="display:' + (answered === qs.length ? 'none' : 'block') + '">⚠ 还有 ' + (qs.length - answered) + ' 题未作答</div>';
  html += '<button class="btn btn-primary" id="submitBtn" ' + (answered === qs.length ? '' : 'disabled') + '>提交试卷</button></div>';
  app.innerHTML = html;

  document.getElementById('examBack').addEventListener('click', function() {
    if (confirm('确定返回首页吗？答题进度将丢失。')) { S.page = 'home'; render(); }
  });
  document.getElementById('submitBtn').addEventListener('click', submitExam);

  window.saveQ = function(qid, type, el) {
    if (type === 'multiple') {
      var vals = []; document.querySelectorAll('input[name="q' + qid + '"]:checked').forEach(function(cb) { vals.push(cb.value); });
      S.answers[qid] = vals.length ? vals : undefined;
    } else { S.answers[qid] = el.value; }
    renderExam(document.getElementById('app'));
  };
}

function submitExam() {
  var uas = S.questions.map(function(q) { var qid = q.id || q.qid; return { id: qid, answer: S.answers[qid] || '' }; });
  var r = calcScore(S.questions, uas);
  S.result = r;
  var record = {
    realname: S.user.realname, score: r.score, correct: r.correct,
    wrong: r.wrong, total: r.total, isPass: r.isPass, time: fmtTime()
  };
  bmSaveRecord(record).catch(function(e) { console.error('成绩上传失败:', e); });
  S.page = 'result'; render();
}

// ==================== 结果页 ====================
function renderResult(app) {
  var r = S.result;
  if (!r) { S.page = 'home'; render(); return; }
  var html = '<div class="container"><div class="score-section">';
  html += '<div class="score-ring' + (r.isPass ? '' : ' fail') + '"><span class="score-num">' + r.score + '</span></div>';
  html += '<div class="score-label">您的得分</div>';
  html += '<div class="score-status' + (r.isPass ? ' pass' : ' fail') + '">' + (r.isPass ? '✅ 恭喜通过！' : '❌ 未通过') + '</div>';
  html += '<div class="score-summary">共 ' + r.total + ' 题<span class="split">|</span>正确 <b>' + r.correct + '</b> 题<span class="split">|</span>错误 <b>' + r.wrong + '</b> 题</div></div>';
  html += '<div class="detail-title">📋 答题明细</div>';

  r.details.forEach(function(d, i) {
    html += '<div class="card"><div class="d-header"><span class="d-index">' + (i + 1) + '.</span><span class="d-tag ' + (d.correct ? 'tag-right' : 'tag-wrong') + '">' + (d.correct ? '✓ 正确' : '✗ 错误') + '</span></div>';
    html += '<div class="d-title">' + esc(d.title) + '</div><div class="d-options">';
    d.options.forEach(function(opt) {
      var v = opt.charAt(0), cls = '', ra = Array.isArray(d.rightAnswer) ? d.rightAnswer : [d.rightAnswer];
      if (ra.includes(v)) cls = 'right';
      if (!d.correct && d.userAnswer && (Array.isArray(d.userAnswer) ? d.userAnswer : [d.userAnswer]).includes(v)) cls = cls === 'right' ? 'right' : 'wrong';
      html += '<span class="d-opt' + (cls ? ' ' + cls : '') + '">' + esc(opt) + '</span>';
    });
    html += '</div>';
    if (d.userAnswer !== undefined && d.userAnswer !== '') html += '<div class="d-answer"><span class="d-label">你的答案：</span><span class="' + (d.correct ? 'text-right' : 'text-wrong') + '">' + esc(String(d.userAnswer)) + '</span></div>';
    if (!d.correct) html += '<div class="d-answer"><span class="d-label">正确答案：</span><span class="text-right">' + esc(String(d.rightAnswer)) + '</span></div>';
    html += '</div>';
  });

  html += '<div class="action-bar"><button class="btn btn-primary" id="retryBtn">再来一次</button><button class="btn btn-outline" id="homeBtn">返回首页</button></div></div>';
  app.innerHTML = html;
  document.getElementById('retryBtn').addEventListener('click', function() { S.page = 'home'; render(); });
  document.getElementById('homeBtn').addEventListener('click', function() { S.page = 'home'; render(); });
}

// ==================== 教师后台 ====================
function renderAdmin(app) {
  app.innerHTML = '<div class="container"><div class="admin-header"><div class="admin-icon">📊</div><div class="admin-title">考试记录管理</div><div class="admin-sub">从 Bmob 加载中...</div></div><div class="loading">⏳ 加载中...</div></div>';

  bmGetRecords().then(function(records) {
    var pc = 0, fc = 0, ts = 0;
    records.forEach(function(r) { ts += r.score || 0; (r.isPass) ? pc++ : fc++; });
    var avg = records.length ? Math.round(ts / records.length) : 0;

    var html = '<div class="container"><div class="admin-header"><div class="admin-icon">📊</div><div class="admin-title">考试记录管理</div><div class="admin-sub">共 ' + records.length + ' 条记录（Bmob云）</div></div>';
    if (records.length > 0) {
      html += '<div class="stat-cards"><div class="stat-card"><div class="stat-num">' + avg + '</div><div class="stat-label">平均分</div></div><div class="stat-card"><div class="stat-num green">' + pc + '</div><div class="stat-label">通过</div></div><div class="stat-card"><div class="stat-num red">' + fc + '</div><div class="stat-label">未通过</div></div></div>';
    } else { html += '<div class="empty">📭<br>暂无考试记录</div>'; }

    records.forEach(function(r) {
      html += '<div class="card record-card"><div class="r-top"><div class="r-user"><span class="r-realname">' + esc(r.realname || '') + '</span><span class="r-del" data-oid="' + r.objectId + '">🗑 删除</span></div><span class="r-score ' + (r.isPass ? 'pass' : 'fail') + '">' + (r.score || 0) + '分</span></div><div class="r-bottom"><span>' + (r.correct || 0) + '对 / ' + (r.wrong || 0) + '错</span><span>' + (r.time || '') + '</span></div></div>';
    });

    html += '<div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">';
    html += '<button class="btn btn-outline" id="exportBtn" style="flex:1;min-width:120px">📥 导出成绩</button>';
    html += '<button class="btn btn-danger" id="clearBtn" style="flex:1;min-width:120px">🗑 清空全部</button></div>';
    html += '<button class="btn btn-seed" id="seedBtn" style="margin-top:10px">📤 导入题库到 Bmob</button>';
    html += '<button class="btn btn-outline" id="backBtn3" style="margin-top:10px">← 返回首页</button></div>';
    app.innerHTML = html;

    // 删除单条
    document.querySelectorAll('.r-del').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        if (!confirm('确定删除这条记录吗？')) return;
        bmDeleteRecord(this.dataset.oid).then(function() { renderAdmin(app); }).catch(function(e) { alert('删除失败: ' + e.message); });
      });
    });

    document.getElementById('exportBtn').addEventListener('click', function() {
      var csv = '姓名,分数,对,错,是否通过,时间\n';
      records.forEach(function(r) { csv += (r.realname || '') + ',' + (r.score || 0) + ',' + (r.correct || 0) + ',' + (r.wrong || 0) + ',' + (r.isPass ? '通过' : '未通过') + ',' + (r.time || '') + '\n'; });
      navigator.clipboard.writeText(csv).then(function() { alert('成绩已复制到剪贴板，可粘贴到 Excel'); }).catch(function() { alert('导出内容：\n' + csv); });
    });

    document.getElementById('clearBtn').addEventListener('click', function() {
      if (!confirm('确定删除【全部】考试记录吗？此操作不可恢复！')) return;
      bmClearRecords().then(function() { alert('已清空全部记录'); renderAdmin(app); }).catch(function(e) { alert('清空失败: ' + e.message); });
    });

    document.getElementById('seedBtn').addEventListener('click', function() { doSeed(this); });
    document.getElementById('backBtn3').addEventListener('click', function() { S.page = 'home'; render(); });
  }).catch(function(e) {
    app.innerHTML = '<div class="container"><div class="empty">❌ 加载失败<br><small>' + esc(e.message) + '</small><br><br>请确认：<br>1. Bmob 后台已创建 questions 和 exam_records 表<br>2. 网络可访问 api2.bmob.cn<br><br><button class="btn btn-outline" id="backBtn4">返回首页</button></div></div>';
    document.getElementById('backBtn4').addEventListener('click', function() { S.page = 'home'; render(); });
  });
}

// ==================== 导入题库 ====================
function doSeed(btn) {
  if (!confirm('将 25 道题目导入 Bmob 云端题库。确定吗？')) return;
  btn.disabled = true; btn.textContent = '导入中...';
  bmSeedQuestions().then(function() {
    btn.textContent = '✅ 导入成功！刷新页面即可从云端抽题';
    btn.style.background = '#d1fae5';
    S.fullQuestions = [];
  }).catch(function(e) {
    btn.textContent = '❌ ' + e.message;
    btn.disabled = false;
  });
}

// ==================== 启动 ====================
bmGetQuestions().then(function(qs) { if (qs && qs.length > 0) S.fullQuestions = qs; }).catch(function() {}).finally(function() { S.page = 'login'; render(); });
</script>
