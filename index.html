<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AQT 在线测试系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;font-size:14px;min-height:100vh}
.container{max-width:750px;margin:0 auto;padding:15px}
.btn-primary{display:block;width:100%;height:44px;line-height:44px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.btn-primary:active{opacity:.8}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-outline{display:block;width:100%;height:44px;line-height:44px;background:#fff;color:#3b82f6;border:1px solid #3b82f6;border-radius:8px;font-size:16px;cursor:pointer}
.btn-danger{display:block;width:100%;height:44px;line-height:44px;background:#fff;color:#ef4444;border:1px solid #ef4444;border-radius:8px;font-size:16px;cursor:pointer}
.btn-seed{display:block;width:100%;height:44px;line-height:44px;background:#f0fdf4;color:#16a34a;border:1px solid #86efac;border-radius:8px;font-size:14px;cursor:pointer;margin-top:10px}
.card{background:#fff;border-radius:10px;padding:15px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.page{display:none}
.page.active{display:block}
.login-card{text-align:center;padding:40px 20px}
.login-icon{font-size:60px;margin-bottom:10px}
.login-title{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.login-desc{font-size:13px;color:#999;margin-bottom:30px}
.form-group{text-align:left;margin-bottom:20px}
.form-label{font-size:14px;font-weight:600;color:#333;margin-bottom:8px}
.form-input{width:100%;height:44px;background:#f5f5f5;border:1px solid #e5e7eb;border-radius:8px;padding:0 12px;font-size:14px;outline:none}
.form-input:focus{border-color:#3b82f6}
.user-bar{display:flex;align-items:center;background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:15px}
.user-icon{font-size:24px;margin-right:8px}
.user-info{flex:1}
.user-name{font-weight:600}
.user-switch{color:#3b82f6;font-size:13px;cursor:pointer}
.back-btn{display:inline-block;color:#3b82f6;font-size:13px;cursor:pointer;padding:5px 0;margin-bottom:10px}
.hero{text-align:center;padding:20px 0}
.hero-icon{font-size:60px}
.hero-title{font-size:22px;font-weight:700;color:#1a1a2e;margin:8px 0 4px}
.hero-desc{font-size:14px;color:#888}
.info-cards{display:flex;gap:8px;margin:20px 0}
.info-card{flex:1;text-align:center;background:#fff;border-radius:8px;padding:14px 0;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.info-num{font-size:22px;font-weight:700;color:#3b82f6}
.info-label{font-size:12px;color:#999;margin-top:4px}
.rules-title{font-size:16px;font-weight:600;margin-bottom:10px}
.rules-item{font-size:13px;color:#666;line-height:2}
.progress-bar{height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-bottom:5px}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:3px;transition:width .3s}
.progress-text{font-size:12px;color:#999;text-align:right;margin-bottom:12px}
.q-header{display:flex;align-items:center;margin-bottom:10px}
.q-index{font-size:16px;font-weight:700;color:#1a1a2e;margin-right:8px}
.q-type{font-size:11px;padding:2px 10px;border-radius:10px;color:#fff}
.type-single{background:#3b82f6}
.type-multiple{background:#f59e0b}
.type-truefalse{background:#10b981}
.q-title{font-size:15px;line-height:1.6;margin-bottom:15px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px}
.option:hover{background:#f9fafb}
.option.checked{border-color:#3b82f6;background:#eff6ff}
.option input{margin-right:10px;transform:scale(1.2);accent-color:#3b82f6}
.submit-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 15px 20px;background:#fff;box-shadow:0 -1px 10px rgba(0,0,0,.05);max-width:750px;margin:0 auto}
.submit-hint{text-align:center;font-size:12px;color:#f59e0b;margin-bottom:8px}
#examList{padding-bottom:80px}
.score-section{text-align:center;padding:30px 0}
.score-ring{width:140px;height:140px;border-radius:50%;margin:0 auto 15px;display:flex;align-items:center;justify-content:center;border:6px solid #10b981}
.score-ring.fail{border-color:#ef4444}
.score-num{font-size:48px;font-weight:800;display:block;line-height:1}
.score-label{font-size:16px;color:#999}
.score-status{font-size:20px;font-weight:600;margin-bottom:8px}
.score-status.pass{color:#10b981}
.score-status.fail{color:#ef4444}
.score-summary{font-size:14px;color:#888}
.split{margin:0 10px;color:#ddd}
.detail-title{font-size:16px;font-weight:600;margin:15px 0 10px}
.d-header{display:flex;align-items:center;margin-bottom:8px}
.d-index{font-size:14px;font-weight:600;margin-right:8px}
.d-tag{font-size:11px;padding:2px 10px;border-radius:10px;color:#fff}
.tag-right{background:#10b981}
.tag-wrong{background:#ef4444}
.d-title{font-size:14px;line-height:1.5;margin-bottom:10px}
.d-options{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.d-option{font-size:12px;padding:4px 10px;background:#f3f4f6;border-radius:6px;color:#666}
.d-option.right{background:#d1fae5;color:#065f46;font-weight:600}
.d-option.wrong{background:#fee2e2;color:#991b1b;text-decoration:line-through}
.d-answer{font-size:13px;margin-bottom:4px}
.d-label{color:#888}
.text-right{color:#10b981;font-weight:600}
.text-wrong{color:#ef4444;font-weight:600}
.action-bar{margin-top:20px;padding-bottom:30px;display:flex;gap:10px;flex-direction:column}
.admin-header{text-align:center;padding:20px 0}
.admin-icon{font-size:50px}
.admin-title{font-size:20px;font-weight:700;color:#1a1a2e;margin:6px 0 2px}
.admin-sub{font-size:13px;color:#999}
.stat-cards{display:flex;gap:8px;margin-bottom:20px}
.stat-card{flex:1;background:#fff;border-radius:10px;padding:15px 0;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.stat-num{font-size:26px;font-weight:800;color:#3b82f6}
.stat-num.green{color:#10b981}
.stat-num.red{color:#ef4444}
.stat-label{font-size:12px;color:#999;margin-top:4px}
.empty{text-align:center;padding:60px 0;color:#999;font-size:14px}
.record-card{margin-bottom:10px}
.r-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.r-user{display:flex;align-items:center;gap:8px}
.r-realname{font-size:15px;font-weight:600}
.r-score{font-size:22px;font-weight:800}
.r-score.pass{color:#10b981}
.r-score.fail{color:#ef4444}
.r-bottom{display:flex;justify-content:space-between;font-size:12px;color:#aaa}
.r-del{color:#ef4444;font-size:12px;cursor:pointer}
.r-del:hover{text-decoration:underline}
.loading{text-align:center;padding:40px;color:#999}
.modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999}
.modal-dialog{width:320px;background:#fff;border-radius:15px;padding:30px 25px;text-align:center}
.modal-title{font-size:18px;font-weight:700;margin-bottom:6px}
.modal-desc{font-size:13px;color:#999;margin-bottom:20px}
.modal-input{width:100%;height:44px;background:#f5f5f5;border:1px solid #e5e7eb;border-radius:8px;padding:0 12px;font-size:14px;text-align:center;outline:none}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns button{flex:1;height:40px;line-height:40px;border-radius:8px;font-size:14px;cursor:pointer;border:none}
.modal-cancel{background:#f3f4f6;color:#666}
.modal-confirm{background:#3b82f6;color:#fff}
</style>
</head>
<body>
<div id="app"></div>
<script>
var EXAM_COUNT=20,PASS_SCORE=60,ADMIN_PASSWORD='aqttest2026';

// Bmob REST API (无需 SDK，直接 HTTP 调用)
var BM_APPID='2940941127b6125eaedc9841eb01d02b';
var BM_KEY='af1e9c184eab1d52a2569982e2ac3fe5';
var BM_URL='https://api2.bmob.cn/1';
function bmHeaders(){return{'X-Bmob-Application-Id':BM_APPID,'X-Bmob-REST-API-Key':BM_KEY,'Content-Type':'application/json'};}

var state={page:'login',user:null,questions:[],fullQuestions:[],userAnswers:{},result:null,adminTapCount:0,adminTapTimer:null};

var fallbackBank=[{id:1,type:'single',title:'HTML 的全称是什么？',options:['A. Hyper Text Markup Language','B. High Tech Modern Language','C. Hyper Transfer Markup Language','D. Home Tool Markup Language'],answer:'A'},{id:2,type:'single',title:'CSS 中哪个属性用于设置背景颜色？',options:['A. color','B. bgcolor','C. background-color','D. background'],answer:'C'},{id:3,type:'multiple',title:'以下哪些是 JavaScript 的数据类型？（多选）',options:['A. String','B. Number','C. Boolean','D. Float'],answer:['A','B','C']},{id:4,type:'truefalse',title:'微信小程序使用 WXML 作为页面结构语言。',options:['A. 正确','B. 错误'],answer:'A'},{id:5,type:'single',title:'小程序中用于页面跳转的 API 是？',options:['A. wx.switchTab','B. wx.navigateTo','C. wx.redirectTo','D. 以上都是'],answer:'D'},{id:6,type:'single',title:'CSS 盒子模型中，margin 表示什么？',options:['A. 内边距','B. 外边距','C. 边框','D. 内容区'],answer:'B'},{id:7,type:'truefalse',title:'JavaScript 中, == 和 === 是完全等价的。',options:['A. 正确','B. 错误'],answer:'B'},{id:8,type:'multiple',title:'以下哪些是微信小程序的合法生命周期函数？（多选）',options:['A. onLoad','B. onShow','C. onReady','D. onCreate'],answer:['A','B','C']},{id:9,type:'single',title:'HTTP 状态码 404 表示什么？',options:['A. 服务器错误','B. 未授权','C. 资源未找到','D. 请求超时'],answer:'C'},{id:10,type:'single',title:'以下哪个不是 JavaScript 框架？',options:['A. React','B. Vue','C. Django','D. Angular'],answer:'C'},{id:11,type:'truefalse',title:'在微信小程序中, app.json 文件是必须存在的。',options:['A. 正确','B. 错误'],answer:'A'},{id:12,type:'single',title:'flex 布局中, 设置主轴方向的属性是？',options:['A. flex-wrap','B. flex-direction','C. justify-content','D. align-items'],answer:'B'},{id:13,type:'multiple',title:'以下哪些是合法的 CSS 长度单位？（多选）',options:['A. px','B. rpx','C. em','D. vm'],answer:['A','B','C']},{id:14,type:'single',title:'JavaScript 中, 用哪个关键字声明常量？',options:['A. var','B. let','C. const','D. static'],answer:'C'},{id:15,type:'truefalse',title:'微信小程序的页面文件可以没有 .json 配置文件。',options:['A. 正确','B. 错误'],answer:'A'},{id:16,type:'single',title:'Promise 对象代表什么？',options:['A. 同步操作','B. 异步操作的最终完成或失败','C. 一个回调函数','D. 一个定时器'],answer:'B'},{id:17,type:'multiple',title:'以下关于 ES6 箭头函数的说法, 正确的有？（多选）',options:['A. 语法更简洁','B. 不绑定自己的 this','C. 不能用作构造函数','D. 没有 arguments 对象'],answer:['A','B','C','D']},{id:18,type:'single',title:'Git 中, 将暂存区的内容提交到仓库的命令是？',options:['A. git add','B. git push','C. git commit','D. git merge'],answer:'C'},{id:19,type:'truefalse',title:'微信小程序支持直接操作 DOM。',options:['A. 正确','B. 错误'],answer:'B'},{id:20,type:'single',title:'在 Vue.js 中, 用于双向数据绑定的指令是？',options:['A. v-bind','B. v-model','C. v-on','D. v-if'],answer:'B'},{id:21,type:'single',title:'TCP/IP 协议中, HTTP 默认使用的端口号是？',options:['A. 21','B. 80','C. 443','D. 8080'],answer:'B'},{id:22,type:'multiple',title:'以下哪些属于前端性能优化手段？（多选）',options:['A. 图片懒加载','B. 代码压缩','C. CDN 加速','D. 减少 HTTP 请求'],answer:['A','B','C','D']},{id:23,type:'truefalse',title:'JSON 是一种 JavaScript 框架。',options:['A. 正确','B. 错误'],answer:'B'},{id:24,type:'single',title:'在 CSS 中, 使元素浮动的属性是？',options:['A. display','B. position','C. float','D. clear'],answer:'C'},{id:25,type:'truefalse',title:'微信小程序的 rpx 单位可以根据屏幕宽度自适应。',options:['A. 正确','B. 错误'],answer:'A'}];

// ========== Bmob REST 操作 ==========
function bmGet(className,where){var u=BM_URL+'/classes/'+className;if(where)u+='?where='+encodeURIComponent(JSON.stringify(where));return fetch(u,{headers:bmHeaders()}).then(function(r){return r.json();}).then(function(d){return d.results||[];});}
function bmGetAll(className){var u=BM_URL+'/classes/'+className+'?limit=999&order=-createdAt';return fetch(u,{headers:bmHeaders()}).then(function(r){return r.json();}).then(function(d){return d.results||[];});}
function bmPost(className,data){return fetch(BM_URL+'/classes/'+className,{method:'POST',headers:bmHeaders(),body:JSON.stringify(data)}).then(function(r){return r.json();});}
function bmCount(className,where){var u=BM_URL+'/classes/'+className+'?count=1&limit=0';if(where)u+='&where='+encodeURIComponent(JSON.stringify(where));return fetch(u,{headers:bmHeaders()}).then(function(r){return r.json();}).then(function(d){return d.count||0;});}
function bmDelete(className,objectId){return fetch(BM_URL+'/classes/'+className+'/'+objectId,{method:'DELETE',headers:bmHeaders()}).then(function(r){return r.json();});}

// ========== 工具函数 ==========
function shuffle(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=r[i];r[i]=r[j];r[j]=t;}return r;}
function calcScore(qs,uas){var c=0,w=0,d=[];uas.forEach(function(ua){var q=qs.find(function(x){return(x.objectId||x.id)===ua._id||(x.objectId||x.id)===ua.id});if(!q){w++;return}var ok;if(Array.isArray(q.answer)){var ua2=Array.isArray(ua.answer)?ua.answer:[ua.answer],su=ua2.slice().sort(),sr=q.answer.slice().sort();ok=su.length===sr.length&&su.every(function(v,i){return v===sr[i]});}else{ok=ua.answer===q.answer;}ok?c++:w++;d.push({id:q.objectId||q.id,correct:ok,userAnswer:ua.answer,rightAnswer:q.answer,title:q.title,options:q.options,type:q.type});});var t=c+w;return{total:t,correct:c,wrong:w,score:t?Math.round(c/t*100):0,details:d};}
function fmtTime(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function esc(s){s=String(s);return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function render(){var app=document.getElementById('app');app.innerHTML='';if(state.page==='login')renderLogin(app);else if(state.page==='home')renderHome(app);else if(state.page==='exam')renderExam(app);else if(state.page==='result')renderResult(app);else if(state.page==='admin')renderAdmin(app);}

function checkDuplicate(realname){
  var local=JSON.parse(localStorage.getItem('exam_records')||'[]');
  if(local.some(function(r){return r.realname===realname;})){alert('该姓名已参加过考试，不能重复答题');return;}
  bmCount('exam_records',{realname:realname}).then(function(n){if(n>0)alert('该姓名已在云端有考试记录，不能重复答题');else doLogin(realname);}).catch(function(){doLogin(realname);});
}
function doLogin(realname){state.user={realname:realname};state.page='home';state.adminTapCount=0;render();}

function loadQuestions(callback){
  bmGetAll('questions').then(function(res){
    if(res.length>0){callback(res.map(function(r){return{objectId:r.objectId,type:r.type,title:r.title,options:r.options,answer:r.answer};}));return;}
    callback(fallbackBank);
  }).catch(function(){callback(fallbackBank);});
}

function seedQuestions(btn){
  if(btn){btn.disabled=true;btn.textContent='导入中...';}
  bmCount('questions').then(function(n){
    if(n>0){if(btn){btn.disabled=false;btn.textContent='📤 导入题库到 Bmob 云端';}alert('云端已有 '+n+' 道题，跳过导入');return;}
    var done=0;
    fallbackBank.forEach(function(q){
      bmPost('questions',{type:q.type,title:q.title,options:q.options,answer:q.answer}).then(function(r){
        done++;if(done===fallbackBank.length){if(btn)btn.disabled=false;alert('成功导入 '+done+' 道题！刷新后首页显示云端题库数。');}
      }).catch(function(e){done++;if(btn)btn.disabled=false;alert('导入失败:'+e.message);});
    });
  }).catch(function(e){if(btn)btn.disabled=false;alert('查询失败:'+e.message);});
}

function renderLogin(app){app.innerHTML='<div class="page active"><div class="login-card"><div class="login-icon">👤</div><div class="login-title">考生信息登记</div><div class="login-desc">请输入您的姓名后开始考试<br><small style="color:#f59e0b">每个姓名仅限答题一次</small></div><div class="form-group"><div class="form-label">真实姓名</div><input class="form-input" id="nameInput" type="text" placeholder="请输入您的真实姓名" maxlength="10"></div><button class="btn-primary" id="startBtn" disabled style="margin-top:20px">开始考试</button></div></div>';var nameEl=document.getElementById('nameInput'),btn=document.getElementById('startBtn');nameEl.addEventListener('input',function(){btn.disabled=!nameEl.value.trim();});btn.addEventListener('click',function(){checkDuplicate(nameEl.value.trim());});}
function renderHome(app){var u=state.user;loadQuestions(function(all){var total=all.length;app.innerHTML='<div class="page active"><div class="container"><div class="user-bar"><span class="user-icon">👤</span><div class="user-info"><span class="user-name">'+esc(u.realname)+'</span></div><span class="user-switch" id="switchBtn">切换</span></div><div class="hero"><div class="hero-icon">📝</div><div class="hero-title" id="titleTap">AQT 在线测试系统</div><div class="hero-desc">随机出题 · 自动评分 · 即时反馈</div></div><div class="info-cards"><div class="info-card"><div class="info-num">'+total+'</div><div class="info-label">云端题库</div></div><div class="info-card"><div class="info-num">'+EXAM_COUNT+'</div><div class="info-label">本次出题</div></div><div class="info-card"><div class="info-num">'+PASS_SCORE+'分</div><div class="info-label">及格线</div></div></div><div class="card rules"><div class="rules-title">考试须知</div><div class="rules-item">1. 系统将从云端题库中随机抽取 '+EXAM_COUNT+' 道题目</div><div class="rules-item">2. 包含单选题、多选题和判断题三种题型</div><div class="rules-item">3. 答完所有题目后点击提交，系统自动判分</div><div class="rules-item">4. 满分 100 分，'+PASS_SCORE+' 分及以上为合格</div><div class="rules-item" style="color:#f59e0b">5. 每个姓名仅限答题一次</div></div><button class="btn-primary" id="startExamBtn">开始考试</button></div><div id="pwdModal"></div></div>';document.getElementById('switchBtn').addEventListener('click',function(){state.user=null;state.page='login';render();});document.getElementById('startExamBtn').addEventListener('click',function(){startExam(all);});var titleEl=document.getElementById('titleTap');titleEl.addEventListener('click',function(){state.adminTapCount++;if(state.adminTapCount===1)state.adminTapTimer=setTimeout(function(){state.adminTapCount=0;},2000);if(state.adminTapCount>=3){clearTimeout(state.adminTapTimer);state.adminTapCount=0;showPwdModal();}});});}
function showPwdModal(){var modal=document.getElementById('pwdModal');modal.innerHTML='<div class="modal-mask" id="modalMask"><div class="modal-dialog"><div class="modal-title">教师后台验证</div><div class="modal-desc">请输入管理密码</div><input class="modal-input" id="pwdInput" type="password" placeholder="请输入密码"><div class="modal-btns"><button class="modal-cancel" id="pwdCancel">取消</button><button class="modal-confirm" id="pwdConfirm">确认</button></div></div></div>';document.getElementById('pwdCancel').addEventListener('click',function(){modal.innerHTML='';});document.getElementById('modalMask').addEventListener('click',function(e){if(e.target===e.currentTarget)modal.innerHTML='';});document.getElementById('pwdConfirm').addEventListener('click',function(){if(document.getElementById('pwdInput').value===ADMIN_PASSWORD){state.page='admin';render();}else{alert('密码错误');document.getElementById('pwdInput').value='';}});document.getElementById('pwdInput').focus();}
function startExam(allQuestions){var shuffled=shuffle(allQuestions),selected=shuffled.slice(0,EXAM_COUNT);state.fullQuestions=selected;state.questions=selected.map(function(q){var r={_id:q.objectId||q.id};for(var k in q)if(k!=='answer')r[k]=q[k];return r;});state.userAnswers={};state.page='exam';render();}
function renderExam(app){var answeredCount=Object.keys(state.userAnswers).length;var pct=state.questions.length?(answeredCount/state.questions.length*100):0;var html='<div class="page active"><div class="container"><span class="back-btn" id="examBackBtn">← 返回首页</span><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="progress-text">已答 '+answeredCount+' / '+state.questions.length+' 题</div><div id="examList">';state.questions.forEach(function(q,qi){var qid=q._id||q.id;var tl=q.type==='single'?'单选':q.type==='multiple'?'多选':'判断';html+='<div class="question-card card"><div class="q-header"><span class="q-index">'+(qi+1)+'.</span><span class="q-type type-'+q.type+'">'+tl+'</span></div><div class="q-title">'+esc(q.title)+'</div><div class="options">';q.options.forEach(function(opt){var val=opt.charAt(0),checked=q.type==='multiple'?(state.userAnswers[qid]&&state.userAnswers[qid].includes(val)):(state.userAnswers[qid]===val);html+='<label class="option'+(checked?' checked':'')+'"><input type="'+(q.type==='multiple'?'checkbox':'radio')+'" name="q'+qid+'" value="'+val+'"'+(checked?' checked':'')+' data-qid="'+qid+'" data-value="'+val+'" data-type="'+q.type+'">'+esc(opt)+'</label>';});html+='</div></div>';});html+='</div></div><div class="submit-bar"><div class="submit-hint" style="display:'+(answeredCount<state.questions.length?'block':'none')+'">还有 '+(state.questions.length-answeredCount)+' 题未作答</div><button class="btn-primary" id="submitBtn"'+(answeredCount<state.questions.length?' disabled':'')+'>提交答卷</button></div></div>';app.innerHTML=html;document.getElementById('examBackBtn').addEventListener('click',function(){if(confirm('确定返回首页吗？当前已作答内容将丢失。')){state.page='home';render();}});document.querySelectorAll('.option input').forEach(function(inp){inp.addEventListener('change',function(e){var d=e.target.dataset,qid=d.qid;if(d.type==='multiple'){var arr=state.userAnswers[qid]||[];if(!Array.isArray(arr))arr=[arr];if(e.target.checked){if(!arr.includes(d.value))arr.push(d.value);}else{arr=arr.filter(function(v){return v!==d.value;});}state.userAnswers[qid]=arr.length?arr:undefined;}else{state.userAnswers[qid]=e.target.checked?d.value:undefined;}if(state.userAnswers[qid]===undefined)delete state.userAnswers[qid];renderExam(app);});});document.getElementById('submitBtn').addEventListener('click',function(){if(!confirm('您已完成 '+Object.keys(state.userAnswers).length+' / '+state.questions.length+' 题，确认提交吗？'))return;state.result=calcScore(state.fullQuestions,state.questions.map(function(q){var qid=q._id||q.id;return{_id:qid,id:qid,answer:state.userAnswers[qid]!==undefined?state.userAnswers[qid]:''};}));saveRecord();state.page='result';render();});}
function saveRecord(){var record={realname:state.user.realname,score:state.result.score,correct:state.result.correct,wrong:state.result.wrong,total:state.result.total,isPass:state.result.score>=PASS_SCORE,time:fmtTime(new Date())};var local=JSON.parse(localStorage.getItem('exam_records')||'[]');local.push(record);localStorage.setItem('exam_records',JSON.stringify(local));bmPost('exam_records',record).then(function(){console.log('成绩已上传云端');}).catch(function(e){console.error('上传失败:',e);});}
function renderResult(app){var r=state.result,isPass=r.score>=PASS_SCORE,u=state.user;var html='<div class="page active"><div class="container"><div style="text-align:center;font-size:14px;margin-bottom:20px">考生：<b>'+esc(u.realname)+'</b></div><div class="score-section"><div class="score-ring'+(isPass?'':' fail')+'"><div style="text-align:center"><span class="score-num">'+r.score+'</span><span class="score-label">分</span></div></div><div class="score-status'+(isPass?' pass':' fail')+'">'+(isPass?'🎉 恭喜通过！':'😔 未通过')+'</div><div class="score-summary">答对 '+r.correct+' 题<span class="split">|</span>答错 '+r.wrong+' 题<span class="split">|</span>共 '+r.total+' 题</div></div><div class="detail-title">答题明细</div>';r.details.forEach(function(d,i){html+='<div class="card"><div class="d-header"><span class="d-index">'+(i+1)+'.</span><span class="d-tag '+(d.correct?'tag-right':'tag-wrong')+'">'+(d.correct?'✓ 正确':'✗ 错误')+'</span></div><div class="d-title">'+esc(d.title)+'</div><div class="d-options">';d.options.forEach(function(opt){var v=opt.charAt(0),cls='',ra=Array.isArray(d.rightAnswer)?d.rightAnswer:[d.rightAnswer];if(ra.includes(v))cls='right';if(!d.correct&&d.userAnswer&&(Array.isArray(d.userAnswer)?d.userAnswer:[d.userAnswer]).includes(v))cls=cls==='right'?'right':'wrong';html+='<span class="d-option'+(cls?' '+cls:'')+'">'+esc(opt)+'</span>';});html+='</div>';if(d.userAnswer!==undefined&&d.userAnswer!=='')html+='<div class="d-answer"><span class="d-label">你的答案：</span><span class="'+(d.correct?'text-right':'text-wrong')+'">'+esc(String(d.userAnswer))+'</span></div>';if(!d.correct)html+='<div class="d-answer"><span class="d-label">正确答案：</span><span class="text-right">'+esc(String(d.rightAnswer))+'</span></div>';html+='</div>';});html+='<div class="action-bar"><button class="btn-primary" id="retryBtn">再来一次</button><button class="btn-outline" id="homeBtn">返回首页</button></div></div></div>';app.innerHTML=html;document.getElementById('retryBtn').addEventListener('click',function(){state.page='home';render();});document.getElementById('homeBtn').addEventListener('click',function(){state.page='home';render();});}
function deleteOneLocal(idx,app){var records=JSON.parse(localStorage.getItem('exam_records')||'[]');records=records.filter(function(r,i){return i!==idx;});localStorage.setItem('exam_records',JSON.stringify(records));renderAdminLocal(app);}
function deleteOneCloud(objectId,app){if(!confirm('确定删除这条记录吗？'))return;bmDelete('exam_records',objectId).then(function(){renderAdmin(app);}).catch(function(e){alert('删除失败:'+e.message);});}
function renderAdminLocal(app){var records=JSON.parse(localStorage.getItem('exam_records')||'[]');records.sort(function(a,b){return new Date(b.time)-new Date(a.time);});var pc=0,fc=0,ts=0;records.forEach(function(r){ts+=r.score;r.isPass?pc++:fc++;});var avg=records.length?Math.round(ts/records.length):0;var html='<div class="page active"><div class="container"><div class="admin-header"><div class="admin-icon">📊</div><div class="admin-title">考试记录管理</div><div class="admin-sub">共 '+records.length+' 条记录（本地）</div></div>';if(records.length>0)html+='<div class="stat-cards"><div class="stat-card"><div class="stat-num">'+avg+'</div><div class="stat-label">平均分</div></div><div class="stat-card"><div class="stat-num green">'+pc+'</div><div class="stat-label">通过</div></div><div class="stat-card"><div class="stat-num red">'+fc+'</div><div class="stat-label">未通过</div></div></div>';else html+='<div class="empty">📭<br>暂无考试记录</div>';records.forEach(function(r,i){html+='<div class="card record-card"><div class="r-top"><div class="r-user"><span class="r-realname">'+esc(r.realname)+'</span><span class="r-del" data-idx="'+i+'">🗑 删除</span></div><span class="r-score '+(r.isPass?'pass':'fail')+'">'+r.score+'分</span></div><div class="r-bottom"><span>'+r.correct+'对 / '+r.wrong+'错</span><span class="r-time">'+r.time+'</span></div></div>';});html+='<div style="display:flex;gap:10px;margin-top:15px"><button class="btn-outline" id="exportBtn">导出成绩</button><button class="btn-danger" id="clearBtn">清空全部记录</button></div><button class="btn-seed" id="seedBtnLocal">📤 导入题库到 Bmob 云端</button><button class="btn-outline" id="backBtn" style="margin-top:10px">返回首页</button></div></div>';app.innerHTML=html;document.querySelectorAll('.r-del').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();if(confirm('确定删除这条记录吗？'))deleteOneLocal(parseInt(this.dataset.idx),app);});});document.getElementById('backBtn').addEventListener('click',function(){state.page='home';render();});document.getElementById('exportBtn').addEventListener('click',function(){var csv='姓名,分数,对/错,时间\n';records.forEach(function(r){csv+=(r.realname||'')+','+r.score+','+r.correct+'/'+r.wrong+','+r.time+'\n';});navigator.clipboard.writeText(csv).then(function(){alert('已复制到剪贴板');}).catch(function(){alert('复制失败：\n'+csv);});});document.getElementById('clearBtn').addEventListener('click',function(){if(confirm('确定删除全部考试记录吗？')){localStorage.removeItem('exam_records');renderAdminLocal(app);}});document.getElementById('seedBtnLocal').addEventListener('click',function(){seedQuestions(this);});}
function renderAdmin(app){
  app.innerHTML='<div class="page active"><div class="container"><div class="admin-header"><div class="admin-icon">📊</div><div class="admin-title">考试记录管理</div><div class="admin-sub">从云端加载中...</div></div><div class="loading">⏳ 加载中...</div></div></div>';
  bmGetAll('exam_records').then(function(records){
    var pc=0,fc=0,ts=0;records.forEach(function(r){ts+=r.score||0;(r.isPass)?pc++:fc++;});
    var avg=records.length?Math.round(ts/records.length):0;
    var html='<div class="page active"><div class="container"><div class="admin-header"><div class="admin-icon">📊</div><div class="admin-title">考试记录管理</div><div class="admin-sub">共 '+records.length+' 条记录（Bmob 云端）</div></div>';
    if(records.length>0)html+='<div class="stat-cards"><div class="stat-card"><div class="stat-num">'+avg+'</div><div class="stat-label">平均分</div></div><div class="stat-card"><div class="stat-num green">'+pc+'</div><div class="stat-label">通过</div></div><div class="stat-card"><div class="stat-num red">'+fc+'</div><div class="stat-label">未通过</div></div></div>';
    else html+='<div class="empty">📭<br>暂无考试记录</div>';
    records.forEach(function(r){html+='<div class="card record-card"><div class="r-top"><div class="r-user"><span class="r-realname">'+esc(r.realname||'')+'</span><span class="r-del" data-oid="'+r.objectId+'">🗑 删除</span></div><span class="r-score '+(r.isPass?'pass':'fail')+'">'+(r.score||0)+'分</span></div><div class="r-bottom"><span>'+(r.correct||0)+'对 / '+(r.wrong||0)+'错</span><span class="r-time">'+(r.time||'')+'</span></div></div>';});
    html+='<div style="display:flex;gap:10px;margin-top:15px"><button class="btn-outline" id="exportBtn">导出成绩</button><button class="btn-danger" id="clearBtn">清空全部记录</button></div><button class="btn-seed" id="seedBtn">📤 导入题库到 Bmob 云端</button><button class="btn-outline" id="backBtn" style="margin-top:10px">返回首页</button></div></div>';
    app.innerHTML=html;
    document.querySelectorAll('.r-del').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();deleteOneCloud(this.dataset.oid,app);});});
    document.getElementById('backBtn').addEventListener('click',function(){state.page='home';render();});
    document.getElementById('exportBtn').addEventListener('click',function(){var csv='姓名,分数,对/错,时间\n';records.forEach(function(r){csv+=(r.realname||'')+','+(r.score||0)+','+(r.correct||0)+'/'+(r.wrong||0)+','+(r.time||'')+'\n';});navigator.clipboard.writeText(csv).then(function(){alert('已复制到剪贴板');}).catch(function(){alert('复制失败：\n'+csv);});});
    document.getElementById('clearBtn').addEventListener('click',function(){if(!confirm('确定删除全部云端考试记录吗？'))return;Promise.all(records.map(function(r){return bmDelete('exam_records',r.objectId);})).then(function(){renderAdmin(app);}).catch(function(){alert('部分删除失败');});});
    document.getElementById('seedBtn').addEventListener('click',function(){seedQuestions(this);});
  }).catch(function(err){renderAdminLocal(app);});
}
render();
</script>
</body>
</html>
